<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoBrutalism Blazor — Neo Brutalism for Blazor</title>
    <base href="/NeoBrutalism.Blazor/" />
    <link rel="preload" id="webassembly" />
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <!-- Design system -->
    <link rel="stylesheet" href="_content/NeoBrutalism.Blazor/nb-design-system.css" />
    <!-- highlight.js (GitHub Dark theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Docs app CSS -->
    <link rel="stylesheet" href="css/docs.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="NeoBrutalism.Blazor.Docs.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
        (function () {
            var redirect = window.location.search.split('?/')[1];
            if (redirect) {
                var decoded = redirect.split('&').slice(0).join('').replace(/~and~/g, '&');
                window.history.replaceState(null, null,
                    window.location.pathname + decoded + window.location.hash
                );
            }
        })();
    </script>
</head>

<body>
    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
