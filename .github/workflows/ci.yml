name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.x'
  BUILD_CONFIGURATION: Release
  COVERAGE_THRESHOLD: 85

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package.json

      - name: Install Node dependencies (Tailwind)
        run: rm -f src/package-lock.json && npm install --prefix src

      - name: Build
        run: dotnet build -c ${{ env.BUILD_CONFIGURATION }}

      - name: Test with coverage
        run: >
          dotnet test tests/NeoBrutalism.Blazor.Tests.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ${{ runner.temp }}/coverage

      - name: Enforce line coverage ≥ ${{ env.COVERAGE_THRESHOLD }}%
        run: |
          REPORT=$(find "${{ runner.temp }}/coverage" -name 'coverage.cobertura.xml' | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::Coverage report not found."
            exit 1
          fi
          LINE_RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT')
          rate = float(tree.getroot().attrib.get('line-rate', 0))
          print(f'{rate * 100:.2f}')
          ")
          echo "Line coverage: ${LINE_RATE}%"
          PASS=$(python3 -c "print('true' if $LINE_RATE >= ${{ env.COVERAGE_THRESHOLD }} else 'false')")
          if [ "$PASS" != "true" ]; then
            echo "::error::Line coverage ${LINE_RATE}% is below the required ${{ env.COVERAGE_THRESHOLD }}%."
            exit 1
          fi
          echo "Coverage check passed: ${LINE_RATE}% >= ${{ env.COVERAGE_THRESHOLD }}%"
