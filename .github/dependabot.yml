version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "lf-nyxra"

  - package-ecosystem: "npm"
    directory: "/src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "lf-nyxra"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "lf-nyxra"
