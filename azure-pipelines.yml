trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

name: '${{ parameters.packageVersion }}'

parameters:
  - name: packageVersion
    displayName: 'Package version (SemVer, e.g. 1.2.0)'
    type: string
    default: '0.0.0'

variables:
  buildConfiguration: 'Release'
  coverageThreshold: 85

stages:
  # ──────────────────────────────────────────────
  # Stage 0 — Test & Coverage (PR validation gate)
  # ──────────────────────────────────────────────
  - stage: Test
    displayName: 'Test & Coverage'
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: RunTests
        displayName: 'Build, Test & Enforce Coverage'
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'
              includePreviewVersions: true

          - script: npm ci --prefix src
            displayName: 'Install Node dependencies (Tailwind)'

          - script: dotnet build -c $(buildConfiguration)
            displayName: 'Build'

          - script: dotnet test tests/NeoBrutalism.Blazor.Tests.csproj -c $(buildConfiguration) --no-build --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/coverage
            displayName: 'Run Tests with Coverage'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Coverage to DevOps'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/coverage/**/coverage.cobertura.xml'

          - script: |
              REPORT=$(find $(Agent.TempDirectory)/coverage -name 'coverage.cobertura.xml' | head -1)
              if [ -z "$REPORT" ]; then
                echo "##vso[task.logissue type=error]Coverage report not found."
                exit 1
              fi
              LINE_RATE=$(python3 -c "
              import xml.etree.ElementTree as ET, sys
              tree = ET.parse('$REPORT')
              rate = float(tree.getroot().attrib.get('line-rate', 0))
              print(f'{rate * 100:.2f}')
              ")
              echo "Line coverage: ${LINE_RATE}%"
              echo "##vso[task.setvariable variable=lineCoverage]${LINE_RATE}"
              PASS=$(python3 -c "print('true' if $LINE_RATE >= $(coverageThreshold) else 'false')")
              if [ "$PASS" != "true" ]; then
                echo "##vso[task.logissue type=error]Line coverage ${LINE_RATE}% is below the required $(coverageThreshold)%."
                exit 1
              fi
              echo "Coverage check passed: ${LINE_RATE}% >= $(coverageThreshold)%"
            displayName: 'Enforce line coverage ≥ $(coverageThreshold)%'

  # ──────────────────────────────────────────────
  # Stage 1 — Build, pack & publish NuGet package
  # ──────────────────────────────────────────────
  - stage: NuGet
    displayName: 'NuGet — Build & Publish'
    dependsOn: Test
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), ne('${{ parameters.packageVersion }}', '0.0.0'))
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: PackAndPush
        displayName: 'Pack & Push'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'
              includePreviewVersions: true

          - script: npm ci --prefix src
            displayName: 'Install Node dependencies (Tailwind)'

          - script: dotnet restore src/NeoBrutalism.Blazor.csproj
            displayName: 'Restore'

          - script: dotnet build src/NeoBrutalism.Blazor.csproj -c $(buildConfiguration) --no-restore
            displayName: 'Build'

          - script: dotnet pack src/NeoBrutalism.Blazor.csproj -c $(buildConfiguration) --no-build -o $(Build.ArtifactStagingDirectory) /p:Version=${{ parameters.packageVersion }}
            displayName: 'Pack NuGet'

          - task: NuGetCommand@2
            displayName: 'Push to NuGet.org'
            inputs:
              command: 'push'
              packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg'
              nuGetFeedType: 'external'
              publishFeedCredentials: 'NeoBrutalism.Blazor'

  # ──────────────────────────────────────────────
  # Stage 2 — Build docs site + API reference zip
  # ──────────────────────────────────────────────
  - stage: Docs
    displayName: 'Docs — Build & Package'
    dependsOn: Test
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), ne('${{ parameters.packageVersion }}', '0.0.0'))
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: BuildDocs
        displayName: 'Build Docs Site'
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'
              includePreviewVersions: true

          - script: dotnet tool install -g docfx
            displayName: 'Install DocFX'

          - script: npm ci --prefix src
            displayName: 'Install Node dependencies (Tailwind)'

          - script: docfx metadata docs/docfx/docfx.json
            displayName: 'DocFX — Extract API metadata'

          - script: docfx build docs/docfx/docfx.json
            displayName: 'DocFX — Build API docs'

          - script: dotnet publish docs/NeoBrutalism.Blazor.Docs.csproj -c $(buildConfiguration) -o $(Build.BinariesDirectory)/docs-site
            displayName: 'Publish Blazor WASM docs site'

          - task: ArchiveFiles@2
            displayName: 'Zip docs site'
            inputs:
              rootFolderOrFile: '$(Build.BinariesDirectory)/docs-site/wwwroot'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/docs-site.zip'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish docs artifact'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/docs-site.zip'
              artifactName: 'docs'
